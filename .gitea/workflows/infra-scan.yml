name: Gitea Actions - Infrastructure Security Scan


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main, "feature/*" ]
    paths:
      - 'infra/**'
      - '.gitea/workflows/infra-scan.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'

jobs:
  template-analyzer:
    name: Azure Template Analyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Azure Template Analyzer
        run: |
          # Get the latest version tag from the repository
          VERSION=$(curl -s "https://api.github.com/repos/Azure/template-analyzer/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "Latest version is $VERSION"
          
          # Download the linux-x64 binary
          curl -L "https://github.com/Azure/template-analyzer/releases/download/${VERSION}/TemplateAnalyzer-linux-x64.zip" -o analyzer.zip
          
          # Unzip the package
          unzip analyzer.zip -d template-analyzer
          chmod +x template-analyzer/TemplateAnalyzer
          
          # Add to PATH (temporarily for the next step)
          echo "$(pwd)/template-analyzer" >> $GITHUB_PATH

      - name: Run Template Analyzer (Console)
        continue-on-error: true # Allow evaluation warnings for now, but report results
        run: |
          template-analyzer/TemplateAnalyzer analyze-directory infra/ --report-format Console -v

      - name: Run Template Analyzer (SARIF)
        if: always()
        run: |
          template-analyzer/TemplateAnalyzer analyze-directory infra/ --report-format Sarif -o results.sarif

      - name: Upload SARIF Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: infrastructure-scan-sarif
          path: results.sarif
