<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>My cloud Resume</title>
   <style>
      /* Add your CSS styles here */
      body {
         font-family: Arial, Helvetica, sans-serif;
      }
      /* Add more styles as need */

   </style>
   <!--Other head elements-->
   <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
   <script>
      const azureFunctionUrl = "your_azure_function_url";

      $(document).ready(function(){
         // Make a GET request to the backend API
         $.get(azureFunctionUrl, function(data) {
            // Update the visitor count in the headers
            $("#visitor-count").text(data);
         });
      });
   </script>
</head>
<body>
   <!--HEADER-->
   <header>
      <h1>Welcome to My Cloud Resume</h1>
      <p>This page has been viewed <span id="visitor-count">loading...</span></p>
   </header>
   
   <!--NAV BAR-->
   <nav>
      <ul>
         <li><a href="#about">About Me</a></li>
         <li><a href="#resume">Resume</a></li>
      </ul>
   </nav>

   <!--ABOUT SECTION-->
   <section id="about">
      <h2>About me</h2>
      <p>This is the about section. Add details about yourself here.</p>
   </section>

   <!--RESUME SECTION-->
   <section id="resume">
      <h2>This is the resume section. Add details about your resume here.</h2>
   </section>

   <!--FOOTER-->
   <footer>
      <p>&copy; 2023 Drew Davis. All rights reserverd.</p>
   </footer>


</body>
</html>
